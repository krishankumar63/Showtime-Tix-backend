# MySQL Datasource Configuration production
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/test?useSSL=true}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Settings for MySQL
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true


# Your secret key (should be very long and secure)
app.jwt-secret=${JWT_SECRET}
# JWT Access Token (e.g., 15 minutes)
app.jwt-expiration-milliseconds=${APP_JWT_EXPIRATION}
# JWT Refresh Token (e.g., 30 days)
app.jwt-refresh-expiration-milliseconds=${APP_JWT_REFRESH}


omdb.api.key=${OMDB_API_KEY}


# Stripe Configuration
stripe.api.key=${STRIPE_API_KEY}

frontend.url=${FRONTEND_URL}

# --- Spring Cache Settings ---
spring.cache.type=redis
# Don't cache null values to prevent empty database results from hogging memory
spring.cache.redis.cache-null-values=false
# Set a default TTL (Time-To-Live) - 10 minutes in milliseconds
spring.cache.redis.time-to-live=600000

# --- Redis Connection (Using Variables) ---
# We point to variables that will be filled by the Environment
spring.data.redis.host=${REDIS_HOST:redis-15830.c267.us-east-1-4.ec2.cloud.redislabs.com}
spring.data.redis.port=${REDIS_PORT:15830}
